services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scivly-db
    environment:
      POSTGRES_DB: scivly
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scivly"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - scivly-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: scivly-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - scivly-redis-data:/data

volumes:
  scivly-postgres-data:
  scivly-redis-data:

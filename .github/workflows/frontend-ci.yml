name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Restore Next.js cache
        uses: actions/cache@v5
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-next-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/app/**/*', 'frontend/components/**/*', 'frontend/lib/**/*', 'frontend/*.ts', 'frontend/*.tsx', 'frontend/*.js', 'frontend/*.mjs', 'frontend/*.css') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ steps.setup-node.outputs.node-version }}-next-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

name: Frontend CI

on:
  pull_request:
    paths:
      - ".github/workflows/frontend-ci.yml"
      - "frontend/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/frontend-ci.yml"
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

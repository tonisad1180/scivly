name: Codex Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to request Codex review on"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR to trigger Codex review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ inputs.pr_number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '@codex review'
            });
            console.log(`Posted Codex review request on PR #${prNumber}`);

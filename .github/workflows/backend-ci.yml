name: Backend CI

on:
  pull_request:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend/**"
      - "workers/**"
  push:
    paths:
      - ".github/workflows/backend-ci.yml"
      - "backend/**"
      - "workers/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/scivly
      REDIS_URL: redis://localhost:6379/0
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: scivly
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d scivly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            workers/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r workers/requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check backend workers

      - name: Type check with mypy
        run: mypy backend/app workers

      - name: Run pytest
        run: python -m pytest backend/app/tests workers -x -q
